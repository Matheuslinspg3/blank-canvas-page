name: Validate PR

on:
  pull_request:
  push:
    branches:
      - 'codex/**'

jobs:
  validate:
    name: Install, test tracking, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Run tracking tests for this PR
        run: npm run test -- src/test/attribution.test.ts src/test/marketingEvents.test.ts

      - name: Build
        run: npm run build
